# Hermetic CI: lint + type-check + the offscreen test suite on every push/PR.
# The suite is designed to run headless (conftest forces QT_QPA_PLATFORM=
# offscreen) and the realsystemd tests are deselected by pyproject's addopts,
# so no real systemd or display is needed — the GitHub runner reproduces the
# same gate that runs locally.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:  # lets the run be triggered by hand from the Actions tab

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"  # match the dev machine (Fedora 44 / py3.14)

      # PySide6's offscreen platform plugin still links a handful of system
      # libraries even with no display. These are the minimal set the Qt
      # platform abstraction needs to load on a bare Ubuntu runner.
      - name: Install headless Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      # Deliberately pip here, NOT the RPM the app uses locally (pyproject
      # documents why there is no pip packaging) — CI just needs the same
      # libraries present to exercise the code. PySide6 pinned near the dev
      # version so type-checking and runtime behaviour match.
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "PySide6>=6.11,<6.12" pytest pytest-qt ruff mypy

      # Type-check Qt the way the app actually ships. Locally Qt comes from the
      # Fedora RPM, which bundles .pyi stubs but no PEP 561 py.typed marker, so
      # mypy ignores the stubs and treats PySide6 as Any (documented in
      # pyproject). The pip wheel DOES ship py.typed, which would make CI's mypy
      # check against Qt's real stubs and flag errors local can't see. Drop the
      # marker so CI reproduces the deployment environment's type-checking
      # exactly. (Runtime/tests are unaffected — they don't read py.typed.)
      - name: Match local typing (strip pip's Qt py.typed marker)
        run: |
          site=$(python -c "import site; print(site.getsitepackages()[0])")
          rm -f "$site/PySide6/py.typed" "$site/shiboken6/py.typed"
          echo "Stripped py.typed (if present) so Qt is Any to mypy, as on Fedora."

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy, strict)
        run: mypy taskdeck

      - name: Test (hermetic suite, offscreen Qt)
        run: python -m pytest
